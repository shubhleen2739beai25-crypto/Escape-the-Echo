<!DOCTYPE html>
<html>
<head>
  <title>Escape The Echo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Game Container -->
  <div class="game-container">

    <!-- Logo -->
    <img src="logo.png" alt="Escape The Echo Logo" class="logo">

    <!-- UI -->
    <div class="ui">
      <div class="stats">
        <span>Perspectives: <b id="score">0</b>/5</span>
        <span>Time: <b id="timer">0</b>s</span>
      </div>
    </div>

    <!-- Canvas -->
    <canvas id="gameCanvas" width="600" height="400"></canvas>

  </div>

  <script src="script.js"></script>
</body>
</html>
